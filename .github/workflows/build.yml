name: Build EXE

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 这一行是新增的，安装 截图库(pillow) 和 Windows接口库(winsdk)
        pip install pyinstaller pillow winsdk 

    - name: Build with PyInstaller
      run: |
        # 增加 --hidden-import 防止打包漏掉 winsdk 模块
        pyinstaller --onefile --noconsole --hidden-import=winsdk --name TwstOverlay main.py
        echo "Build finished."

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TwstOverlay-Package
        path: |
          dist/TwstOverlay.exe
          data.json
